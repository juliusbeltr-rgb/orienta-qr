<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const lugares = {
  entrada: { nombre: "Entrada Principal", imagen: "entrada.png" },
  biblioteca: { nombre: "Biblioteca", imagen: "biblioteca.png" },
  aula: { nombre: "Aula Magistral", imagen: "aula.png" },
  cafeteria: { nombre: "Cafetería", imagen: "cafeteria.png" },
  administracion: { nombre: "Área Administrativa", imagen: "administracion.png" }
};

if (lugares[id]) {
  document.body.innerHTML = `
    <h1>📍 Ud está aquí</h1>
    <h2>${lugares[id].nombre}</h2>
    <img src="${lugares[id].imagen}" width="300">
  `;
} else {
  document.body.innerHTML = `
    <h1>OrientaQR 🚀</h1>
    <p>Ubicación no detectada</p>
  `;
}
</script>
